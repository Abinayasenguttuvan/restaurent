    <script>
        // PASSWORD EYE TOGGLE
function togglePassword() {
    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }
}

// LOGIN FUNCTION
function login() {
    const accountType = document.getElementById("accountType").value;
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const remember = document.getElementById("remember").checked;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.style.display = "none";

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // Validation
    if (email === "" || password === "") {
        showError("Fill details correctly");
        return;
    }

    if (!emailPattern.test(email)) {
        showError("Enter valid email");
        return;
    }

    const user = {
        email: email,
        accountType: accountType
    };

    let userName = email.split("@")[0];

    localStorage.setItem("userEmail", email);
    localStorage.setItem("userRole", accountType);
    localStorage.setItem("userName", userName);

    if (remember) {
        localStorage.setItem("loggedUser", JSON.stringify(user));
    } else {
        sessionStorage.setItem("loggedUser", JSON.stringify(user));
    }

    // Small animated popup
    showSuccess("Login Successful!");

    setTimeout(() => {
        if (accountType === "admin") {
            window.location.href = "admin.html";
        } else {
            window.location.href = "customer.html";
        }
    }, 1200);
}

function showError(message) {
    const errorMsg = document.getElementById("errorMsg");
    errorMsg.innerText = message;
    errorMsg.style.display = "block";
    errorMsg.style.animation = "none";
    setTimeout(() => {
        errorMsg.style.animation = "fadeIn 0.4s ease";
    }, 10);
}

function showSuccess(message) {
    const popup = document.createElement("div");
    popup.innerText = message;

    popup.style.position = "fixed";
    popup.style.top = "30px";
    popup.style.left = "50%";
    popup.style.transform = "translateX(-50%)";
    popup.style.background = "linear-gradient(135deg,#ff7b00,#ffb347)";
    popup.style.color = "white";
    popup.style.padding = "16px 34px";
    popup.style.borderRadius = "50px";
    popup.style.fontWeight = "600";
    popup.style.boxShadow = "0 10px 30px rgba(255,140,0,.4)";
    popup.style.zIndex = "99999";
    popup.style.animation = "popupAnim .5s ease";

    document.body.appendChild(popup);

    setTimeout(() => {
        popup.remove();
    }, 1000);
}

// Inject popup animation
const style = document.createElement("style");
style.innerHTML = `
@keyframes popupAnim{
    from{
        opacity:0;
        transform:translate(-50%,-40px);
    }
    to{
        opacity:1;
        transform:translate(-50%,0);
    }
}
@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}`;
document.head.appendChild(style);
    </script>
